name: CI

# ============================================================
# Finvanta CBS — Tier-1 CI Pipeline
# Per RBI IT Governance Direction 2023 §7.2 + §8.3
# ============================================================
#
# Gate 1: Build & Test — compile, unit tests, ArchUnit, Spring context, war packaging
# Gate 2: Code Coverage — JaCoCo with 70% line/branch minimum (CBS Tier-1 standard)
# Gate 3: Static Analysis — SpotBugs (bug detection), PMD (code smells + dead code + CPD)
# Gate 4: Dependency Audit — OWASP Dependency-Check for CVE scanning (CVSS >= 7.0 fails)
#
# Per Finacle/Temenos CI standards: ALL gates must pass before merge.
# Java 17 (Temurin) matches pom.xml <java.version>17</java.version>.

# Triggers on ALL branches — every push and every PR gets the full pipeline.
# Per RBI IT Governance §7.2: code quality gates must run on every change,
# not just protected branches. Feature branches catch issues before PR review.
on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ================================================================
  # GATE 1: Build, Test, Package
  # ================================================================
  build-and-test:
    name: "Gate 1: Build & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile
        run: mvn -B -ntp -U clean compile -DskipTests

      - name: Unit + ArchUnit + Integration tests
        run: mvn -B -ntp test

      - name: Package WAR
        run: mvn -B -ntp -DskipTests package

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 7

  # ================================================================
  # GATE 2: Code Coverage (JaCoCo)
  # Per RBI IT Governance §7.2: test coverage must be measured and
  # enforced. CBS Tier-1 minimum: 70% line, 60% branch.
  # ================================================================
  coverage:
    name: "Gate 2: Coverage (JaCoCo)"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # JaCoCo plugin is configured in pom.xml (prepare-agent, report, check
      # bound to the test/verify lifecycle). The `check` goal's <rules> are a
      # nested type and cannot be set via -D properties, so they must live in
      # the POM. Running `verify` triggers prepare-agent -> test -> report ->
      # check, which enforces the 70% line / 60% branch minimums.
      - name: Run tests and enforce coverage thresholds
        run: mvn -B -ntp clean verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ github.run_number }}
          path: target/site/jacoco/
          retention-days: 14

  # ================================================================
  # GATE 3: Static Analysis (SpotBugs + PMD + CPD)
  # Per RBI IT Governance §7.2: automated code quality enforcement.
  # SpotBugs: null-deref, resource leaks, concurrency bugs
  # PMD: dead code, empty blocks, unused variables, code smells
  # CPD: copy-paste / duplicate code detection (100 token threshold)
  # ================================================================
  static-analysis:
    name: "Gate 3: Static Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile (required for SpotBugs bytecode analysis)
        run: mvn -B -ntp -U clean compile -DskipTests

      - name: SpotBugs — bug detection
        # excludeFilterFile silences Spring-DI EI_EXPOSE_REP* noise and
        # explicitly-tracked findings; see .github/spotbugs-exclude.xml.
        run: |
          mvn -B -ntp com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:check \
            -Dspotbugs.effort=Max \
            -Dspotbugs.threshold=Medium \
            -Dspotbugs.failOnError=true \
            -Dspotbugs.excludeFilterFile=.github/spotbugs-exclude.xml

      - name: PMD — code smells and dead code
        run: |
          mvn -B -ntp org.apache.maven.plugins:maven-pmd-plugin:3.26.0:check \
            -Dpmd.failOnViolation=true \
            -Dpmd.printFailingErrors=true \
            -Dpmd.minimumPriority=3

      - name: CPD — duplicate code detection
        run: |
          mvn -B -ntp org.apache.maven.plugins:maven-pmd-plugin:3.26.0:cpd-check \
            -Dcpd.failOnViolation=true \
            -Dcpd.minimumTokens=100 \
            -Dcpd.printFailingErrors=true

      - name: Upload analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-${{ github.run_number }}
          path: |
            target/spotbugsXml.xml
            target/pmd.xml
            target/cpd.xml
            target/site/
          retention-days: 14

  # ================================================================
  # GATE 4: Dependency Audit (OWASP Dependency-Check)
  # Per RBI IT Governance §8.2: no runtime dependency with CVSS >= 7.0.
  # Scans all Maven dependencies for known CVEs via NVD database.
  # ================================================================
  dependency-audit:
    name: "Gate 4: Dependency Audit (OWASP)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: OWASP Dependency-Check
        run: |
          mvn -B -ntp org.owasp:dependency-check-maven:11.1.1:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=.github/owasp-suppressions.xml \
            -Dformats=HTML,JSON
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-${{ github.run_number }}
          path: target/dependency-check-report.*
          retention-days: 14
