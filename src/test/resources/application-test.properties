# ============================================================
# Finvanta CBS — Test Profile Configuration
# Uses H2 in-memory database for fast, isolated test execution.
# Per CBS testing standards: each test class gets a fresh DB.
# ============================================================

spring.datasource.url=jdbc:h2:mem:finvanta_test;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable H2 console in tests
spring.h2.console.enabled=false

# Faster test execution — disable open-in-view
spring.jpa.open-in-view=false

# CBS EOD Parallel Processing — single thread for deterministic test execution
eod.parallel.threads=1

# CBS Value Date Window — allow T+1 for integration tests that test
# multi-day scenarios (accrue on day 2, repay on day 2).
# Production default is T+0 (no future dating). Tests need T+1 because
# the in-memory business date cache (populated via openDay service) is not
# invalidated by direct calendarRepository.save() in test setup code.
cbs.value-date.forward-days=1

# CBS SECURITY: springdoc-openapi removed from classpath (CRITICAL CVEs in swagger-core).
# No springdoc properties needed — the library is not on the classpath.
