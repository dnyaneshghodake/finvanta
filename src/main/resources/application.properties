spring.application.name=finvanta
# CBS: Default to 'dev' (H2 in-memory) for zero-config developer startup.
# Production deployments override via environment variable or command line:
#   SPRING_PROFILES_ACTIVE=sqlserver  (or =prod)
# Per Finacle/Temenos: dev profile uses H2 in-memory, no external dependencies.
spring.profiles.active=dev

# === CBS Session Management per RBI IT Governance Direction 2023 Section 8.3 ===
# Per Finacle/Temenos: CBS sessions for financial operations must timeout
# after a period of inactivity. Finacle default: 15 min, Temenos: 20 min.
# DEV: 30 minutes (longer for development convenience)
# PROD: Override to 15m via application-prod.properties or environment variable
server.servlet.session.timeout=30m

# Session cookie security settings
# HttpOnly: prevents JavaScript access to session cookie (XSS protection)
# Secure: cookie only sent over HTTPS (enable in production)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=FINVANTA_SESSION

# === CBS API JWT Configuration per Finacle Connect / Temenos IRIS ===
# Per RBI IT Governance Direction 2023 Section 8.3:
# - Access tokens: short-lived (15 min) for financial API operations
# - Refresh tokens: medium-lived (8 hours = 1 business day)
# - HMAC-SHA256 signing key: MUST be overridden in production via env variable
# DEV: Default key for H2 in-memory (deterministic for testing)
# PROD: Override via CBS_JWT_SECRET env var (minimum 256-bit / 32-byte hex)
cbs.jwt.secret=${CBS_JWT_SECRET:c4f8a3e1b9d7f2a6e0c5b8d1f3a7e9c2b4d6f8a0e2c4b6d8f0a2c4e6b8d0f2}
cbs.jwt.access-token-expiry-minutes=15
cbs.jwt.refresh-token-expiry-hours=8
cbs.jwt.issuer=finvanta-cbs

# === CBS Document Upload Configuration per Finacle DOC_MASTER ===
# Per RBI IT Governance Direction 2023: max 5MB per document file
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# === CBS Document Storage Configuration per Finacle DOC_MASTER / Temenos IMAGE.STORE ===
# Controls where uploaded KYC document files are physically stored.
# Per Finacle DOC_MASTER: storage backend is configurable per deployment.
#
# Supported values:
#   DATABASE   — (default) BLOB stored in customer_documents table.
#                Simplest deployment, no external infrastructure needed.
#                Suitable for < 50K customers. DB backup includes documents.
#                Per RBI: encrypted at rest via DB-level TDE.
#
#   FILESYSTEM — Files stored on local filesystem / NAS / SAN mount.
#                Only a storage path reference is kept in DB.
#                Suitable for > 50K customers / high document volume.
#                Reduces DB size, improves backup/restore performance.
#                Per RBI: filesystem must be encrypted at rest (LUKS/BitLocker/EFS).
#                Requires: finvanta.document.storage.filesystem.base-path
#
# To switch from DATABASE to FILESYSTEM in production:
#   1. Set finvanta.document.storage.type=FILESYSTEM
#   2. Set finvanta.document.storage.filesystem.base-path=/opt/finvanta/docstore
#   3. Restart application — new uploads go to filesystem
#   4. Old documents (BLOB) are served via automatic fallback (hybrid mode)
#   5. Optionally run migration batch to move existing BLOBs to filesystem
#
# === CBS Performance: Disable Open Session in View (OSIV) GLOBALLY ===
# Spring Boot defaults open-in-view=true, keeping the Hibernate Session open during
# JSP/response rendering. Every lazy-loaded association accessed in the view triggers
# a SEPARATE SQL query. With H2 in-memory this is invisible (~0.01ms), but with any
# network database (SQL Server, PostgreSQL, MySQL) each round-trip costs ~2-5ms.
# Per Finacle/Temenos Tier-1: OSIV must be disabled. All data must be fetched in the
# service/controller layer BEFORE the response is rendered.
# Set globally here so ALL profiles (dev, sqlserver, prod) benefit.
spring.jpa.open-in-view=false

# === CBS Transaction Pipeline Logging ===
# INFO in base profile — override to DEBUG in application-dev.properties only.
# Per RBI IT Governance Direction 2023 §8.3: production logs must NOT contain
# PII (PAN, Aadhaar, account numbers in bind parameters). DEBUG/TRACE levels
# for Hibernate SQL and com.finvanta.* are restricted to dev profile.
logging.level.com.finvanta.transaction=INFO
logging.level.com.finvanta.controller=INFO
logging.level.com.finvanta.service=INFO

# === Hibernate SQL Logging ===
# WARN in base profile. DEBUG/TRACE ONLY in application-dev.properties.
# CRITICAL: org.hibernate.orm.jdbc.bind=TRACE logs ALL SQL bind parameter values
# in plaintext — including encrypted PII fields (PAN, Aadhaar), account numbers,
# passwords, and financial amounts. Per UIDAI Act 2016 Section 29 and RBI IT
# Governance Direction 2023: PII must never appear in application logs.
# The logback-spring.xml sets this to OFF for prod, but Spring Boot logging.level.*
# properties override logback XML — so this base-profile value MUST be WARN.
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=OFF

finvanta.document.storage.type=DATABASE

# Filesystem storage base path (required only when type=FILESYSTEM).
# Path structure: {base-path}/{tenantId}/documents/{customerId}/{docId}_{filename}
# Must be writable by the application service account.
# Per Finacle DOC_MASTER: use shared NAS/SAN for multi-instance deployments.
# finvanta.document.storage.filesystem.base-path=/opt/finvanta/docstore

# === CORS Configuration for React + Next.js Frontend ===
# Per RBI IT Governance Direction 2023 §8.1: CORS origins must be explicitly whitelisted.
# DEV: localhost:3000 and localhost:3001
# PROD: Override via environment variables (--spring.boot.app.cors.allowed-origins)
spring.boot.app.cors.allowed-origins=http://localhost:3000,http://localhost:3001
spring.boot.app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.boot.app.cors.allowed-headers=Content-Type,Authorization,X-Tenant-Id,X-Request-ID,X-Client-Version
spring.boot.app.cors.exposed-headers=Authorization,X-Request-ID,X-Total-Count,X-Total-Pages,X-Current-Page,X-Page-Size
spring.boot.app.cors.max-age=86400

# === Jackson Configuration for JSON Serialization ===
# Important for React: dates should NOT be timestamps, use ISO 8601 format
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# === Server Configuration ===
# CBS: No servlet context-path. All API controllers already include /api/v1/
# in their @RequestMapping. A context-path=/api would cause double-prefix
# (/api/api/v1/...) breaking all API routes.
# server.servlet.context-path=
spring.websocket.servlet.path=/ws

