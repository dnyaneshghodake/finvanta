spring:
  application:
    name: finvanta

  # H2 Database for Development
  datasource:
    url: jdbc:h2:mem:finvantadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd

server:
  port: 8080
  servlet:
    session:
      timeout: 30m

logging:
  level:
    root: INFO
    com.finvanta: DEBUG
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# SQL Server Production Profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=finvanta;encrypt=true;trustServerCertificate=true
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:sqlserver#123}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    com.finvanta: INFO
