# ============================================================
# Finvanta CBS — Local SQL Server Profile
# ============================================================
#
# Activate with: --spring.profiles.active=sqlserver
# Or in application.properties: spring.profiles.active=sqlserver
#
# CBS SECURITY WARNING:
# This profile contains development credentials for local SQL Server.
# NEVER use 'sa' account or hardcoded passwords in production.
# Production MUST use application-prod.properties with environment variables.
# ============================================================

# --- SQL Server DataSource (Local Development) ---
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=finvanta;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=sqlserver#123

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# CBS: 'update' for local development — auto-creates/alters tables.
# Production MUST use 'validate' with DDL-managed schema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Connection Pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000

# --- Security ---
spring.h2.console.enabled=false

# --- CBS EOD Parallel Processing ---
eod.parallel.threads=4

# --- Session ---
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=FINVANTA_SESSION
