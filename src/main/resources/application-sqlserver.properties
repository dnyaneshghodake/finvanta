# ============================================================
# Finvanta CBS — Local SQL Server Profile
# ============================================================
#
# Activate with: --spring.profiles.active=sqlserver
# Or in application.properties: spring.profiles.active=sqlserver
#
# CBS SECURITY WARNING:
# This profile contains development credentials for local SQL Server.
# NEVER use 'sa' account or hardcoded passwords in production.
# Production MUST use application-prod.properties with environment variables.
# ============================================================

# --- SQL Server DataSource (Local Development) ---
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=finvanta;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
#
# CBS SECURITY: Credentials encrypted with AES-256-GCM per RBI IT Governance.
# To use encrypted credentials (PowerShell — use quotes around each -D):
#   1. Generate key:       mvn -q compile exec:java "-Dexec.mainClass=com.finvanta.config.CbsPropertyDecryptor" "-Dexec.args=genkey"
#   2. Encrypt username:   mvn -q compile exec:java "-Dexec.mainClass=com.finvanta.config.CbsPropertyDecryptor" "-Dexec.args=encrypt <key> sa"
#   3. Encrypt password:   mvn -q compile exec:java "-Dexec.mainClass=com.finvanta.config.CbsPropertyDecryptor" "-Dexec.args=encrypt <key> sqlserver#123"
#   4. Set env variable:   $env:FINVANTA_DB_ENCRYPTION_KEY = "<key>"  (PowerShell)
#                           set FINVANTA_DB_ENCRYPTION_KEY=<key>       (cmd)
#   5. Replace values below with ENC(...) output from step 2 and 3.
#   See docs/DEPLOYMENT_GUIDE.md Section 5 for detailed instructions.
#
# Plaintext fallback (for initial setup ONLY — replace with ENC(...) after first run):
spring.datasource.username=sa
spring.datasource.password=sqlserver#123

# --- JPA / Hibernate ---
# CBS: Hibernate 6.4 auto-detects dialect from JDBC URL, but we set it explicitly
# via BOTH properties to ensure SQL Server dialect is used regardless of classpath.
# spring.jpa.database-platform is the Spring Boot property; hibernate.dialect is
# the native Hibernate property. Setting both prevents H2Dialect from being
# auto-detected when the H2 driver jar is on the runtime classpath.
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
# CBS: 'update' for local development — auto-creates/alters tables.
# Production MUST use 'validate' with DDL-managed schema.
spring.jpa.hibernate.ddl-auto=update
# CBS Tier-1: SQL logging disabled on console. SQL queries contain table/column
# names useful for attackers. Per Finacle/Temenos: SQL logging is routed to
# dedicated log files via logback (see logback-spring.xml sqlserver profile),
# never to System.out. Enable show-sql ONLY for short debugging sessions.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CBS CRITICAL: Disable Open Session in View (OSIV) for SQL Server.
# Spring Boot defaults open-in-view=true, which keeps the Hibernate Session open
# during JSP rendering. Every lazy-loaded association accessed in JSP triggers a
# SEPARATE SQL query over the network (N+1 problem). With H2 in-memory this is
# invisible (~0.01ms/query), but with SQL Server over TCP each round-trip costs
# ~2-5ms. A customer view page with 20 lazy loads = 40-100ms wasted overhead.
# Per Finacle/Temenos Tier-1: OSIV must be disabled on all network databases.
# All data must be fetched in the service layer BEFORE the response is rendered.
spring.jpa.open-in-view=false

# CBS: Hibernate JDBC batch size for bulk operations (EOD, batch processing).
# Per Finacle BATCH_ENGINE: batch inserts/updates are grouped into batches of 25
# to reduce TCP round-trips to SQL Server. Without this, each INSERT/UPDATE is
# sent individually — 1000 inserts = 1000 round-trips instead of 40 batches.
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- Connection Pool (HikariCP) ---
# CBS: Pool sized for local SQL Server development.
# minimum-idle=3 ensures 3 connections are always warm (no cold-start penalty).
# maximum-pool-size=10 handles concurrent page loads during development.
# Per Finacle CONNECTION_POOL: idle connections must stay warm to avoid TCP
# handshake + authentication overhead (~100-200ms per new SQL Server connection).
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# --- SQL Init: DISABLED for sqlserver profile ---
# Per Tier-1 CBS (Finacle/Temenos): data.sql seed data is NEVER loaded on
# non-embedded databases. All seed data comes from CbsBootstrapInitializer
# which creates a fully operational system on first startup (Day Zero pipeline).
# Only the 'dev' profile (H2 in-memory) uses data.sql for convenience.
spring.sql.init.mode=never

# --- Security ---
spring.h2.console.enabled=false

# CBS MANDATORY: MFA encryption key for persistent database profiles.
# Per RBI IT Governance §8.4: MFA secrets are authentication credentials
# that must be encrypted with a key NOT in source code.
# The application will FAIL STARTUP if this is not set.
# Generate: openssl rand -hex 32
# Set env: $env:MFA_ENCRYPTION_KEY = "<64-hex-chars>"  (PowerShell)
#           export MFA_ENCRYPTION_KEY=<64-hex-chars>    (Linux/Mac)
mfa.encryption.key=${MFA_ENCRYPTION_KEY}

# --- CBS EOD Parallel Processing ---
eod.parallel.threads=4

# --- Session ---
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=FINVANTA_SESSION
