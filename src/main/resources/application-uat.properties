# ============================================================================
# CBS Tier-1 UAT (User Acceptance Testing) Profile
# Per CBS 4-environment standard: dev -> sit -> uat -> prod
# ============================================================================

spring.datasource.url=jdbc:sqlserver://${UAT_DB_HOST:localhost}:1433;databaseName=finvanta_uat;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${UAT_DB_USERNAME:sa}
spring.datasource.password=${UAT_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.h2.console.enabled=false

logging.level.root=WARN
logging.level.com.finvanta=INFO
