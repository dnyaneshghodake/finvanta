# ============================================================
# Finvanta CBS - Production / Non-Dev Profile (SQL Server)
# Tier-1 Core Banking System - RBI Compliant
# ============================================================
#
# Activate with: --spring.profiles.active=prod
# Or set environment variable: SPRING_PROFILES_ACTIVE=prod
#
# For higher environments (UAT/Staging/Production), override credentials
# via environment variables (Spring Boot resolves env vars over file values):
#   SPRING_DATASOURCE_URL=jdbc:sqlserver://prodhost:1433;databaseName=finvanta;encrypt=true;trustServerCertificate=false
#   SPRING_DATASOURCE_USERNAME=<db-user>
#   SPRING_DATASOURCE_PASSWORD=<vault-managed-secret>
#   FINVANTA_PII_KEY=<64-hex-char-key-from-HSM>
# ============================================================

# --- SQL Server DataSource ---
# CBS: No fallback URL in prod — missing SPRING_DATASOURCE_URL must fail startup.
# trustServerCertificate=false enforces TLS cert validation (RBI IT Governance 2023).
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# --- JPA / Hibernate ---
# CBS: Set dialect via BOTH Spring Boot and native Hibernate properties to ensure
# SQL Server dialect is used regardless of classpath auto-detection.
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
# CBS: 'validate' ensures entity mappings match the DDL-managed schema.
# Schema changes MUST be applied via ddl-sqlserver.sql, never by Hibernate auto-DDL.
# 'validate' catches entity/column mismatches at startup instead of at runtime.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=dbo

# CBS: Hibernate JDBC batch size for bulk operations (EOD, batch processing).
# Per Finacle BATCH_ENGINE: batch inserts/updates grouped into batches of 25.
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- Connection Pool (HikariCP) ---
# Per CBS standards: pool sized for peak EOD batch load.
# 10 connections handles normal load; increase for parallel batch processing.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# --- Security Hardening ---
spring.h2.console.enabled=false
spring.jpa.open-in-view=false

# --- Server Configuration (Tomcat 10) ---
server.servlet.session.timeout=15m
server.servlet.session.cookie.http-only=true
# CBS: secure=true ensures session cookies are only sent over HTTPS (RBI mandate).
server.servlet.session.cookie.secure=true
# CBS: SameSite=Strict prevents CSRF via cross-site requests (defense-in-depth).
server.servlet.session.cookie.same-site=strict

# --- JSP View Resolver ---
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# --- Spring Boot Actuator (health checks + metrics for Tomcat/K8s) ---
# Per RBI IT Governance Direction 2023 §7.4: production systems must expose
# operational metrics for SLA monitoring and capacity planning.
# health: K8s liveness/readiness probes
# info: build version for deployment tracking
# prometheus: Micrometer metrics for Prometheus scraping (CBS Tier-1 observability)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# CBS Tier-1: Prometheus metrics tags for multi-tenant/multi-branch isolation.
# Per Finacle PERF_MONITOR: metrics must be attributable to tenant and branch.
management.metrics.tags.application=finvanta-cbs

# CBS Tier-1: OpenAPI spec DISABLED in production per RBI IT Governance §8.5.
# API schema exposure in production is a security risk (endpoint enumeration).
# In dev: /v3/api-docs is accessible (SecurityConfig permits it).
# Swagger UI webjar is NOT included (removed due to GHSA-72hv-8253-57qq).
springdoc.api-docs.enabled=false

# --- Logging (production) ---
logging.level.root=INFO
logging.level.com.finvanta=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
