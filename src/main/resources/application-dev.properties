# Dev profile - H2 in-memory database
spring.datasource.url=jdbc:h2:mem:finvantadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# CBS: Do NOT set spring.jpa.database-platform for H2. Hibernate 6.4 auto-detects
# it from the JDBC URL. Explicitly setting H2Dialect causes it to "leak" into
# other profiles when Hibernate's auto-detection picks it up from the classpath.
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# CBS EOD Parallel Processing (P2-2)
# Thread pool size for parallel account processing in EodOrchestrator Steps 2-5.
# Each account gets its own REQUIRES_NEW transaction with pessimistic lock.
# Production: tune based on DB connection pool size (threads <= pool/2).
eod.parallel.threads=4
