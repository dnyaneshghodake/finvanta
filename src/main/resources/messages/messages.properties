# CBS baseline i18n bundle per Finacle GLOBAL_LABEL / Temenos LANGUAGE.
#
# Keys are canonical CBS error codes thrown by BusinessException or surfaced
# by @ControllerAdvice. The ReloadableResourceBundleMessageSource is
# configured with useCodeAsDefaultMessage=true, so any unmapped code falls
# back to the code itself -- operations teams can grep the log for missing
# codes and add translations incrementally (Hindi / regional languages) per
# RBI Fair Practices Code 2023 section 3.1.
#
# Source module prefix guide (informational, not enforced):
#   TENANT_*     com.finvanta.util.TenantContext
#   REFRESH_*    com.finvanta.api.AuthController / RefreshTokenRotationService
#   CHARGE_*     com.finvanta.charge / com.finvanta.batch.ChargeEngine
#   BRANCH_*     com.finvanta.util.BranchAccessValidator
#   ACCOUNT_*    casa / loan services
#   HO_*         com.finvanta.batch.InterBranchSettlementService

# --- Tenant / security ---------------------------------------------------
TENANT_NOT_SET=Tenant context is not initialised for this request
INVALID_TENANT_HEADER=X-Tenant-Id header is missing or malformed
UNAUTHORIZED_BRANCH=User is not authorised for the requested branch

# --- Authentication / JWT rotation --------------------------------------
REFRESH_TOKEN_REUSED=Refresh token has already been used; session terminated
REFRESH_TOKEN_INVALID=Refresh token is invalid or has expired
ACCOUNT_LOCKED=Account is locked due to repeated failed login attempts
PASSWORD_EXPIRED=Password has expired; please change your password

# --- Charges -------------------------------------------------------------
INVALID_CHARGE_BASE=Charge base amount must be positive
CHARGE_CONFIG_NOT_FOUND=Charge configuration could not be resolved
CHARGE_INACTIVE=Charge configuration is inactive and cannot be applied
UNSUPPORTED_CALCULATION_TYPE=Charge calculation type is not supported
SLAB_NOT_MATCHED=No charge slab matches the requested amount
REASON_REQUIRED=A reason is mandatory for this operation per RBI audit norms

# --- Accounts / transactions -------------------------------------------
ACCOUNT_NOT_FOUND=Requested account could not be located for this tenant
BRANCH_NOT_FOUND=Requested branch could not be located for this tenant
INSUFFICIENT_BALANCE=Available balance is insufficient for this debit
HOLIDAY_DATE=Posting is not permitted on a non-business day

# --- Inter-branch / HO --------------------------------------------------
HO_AUTH_REQUIRED=Head Office authorisation reference is mandatory
