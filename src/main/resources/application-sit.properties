# ============================================================================
# CBS Tier-1 SIT (System Integration Testing) Profile
# Per CBS 4-environment standard: dev -> sit -> uat -> prod
# ============================================================================

spring.datasource.url=jdbc:sqlserver://${SIT_DB_HOST:localhost}:1433;databaseName=finvanta_sit;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${SIT_DB_USERNAME:sa}
spring.datasource.password=${SIT_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.h2.console.enabled=false

logging.level.root=INFO
logging.level.com.finvanta=DEBUG
logging.level.org.hibernate.SQL=DEBUG
